<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riesgos Legislativos - Concesiones Mineras</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #1f2937;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    header h1 { margin: 0 0 10px; font-size: 30px; }
    header p { margin: 0; font-size: 15px; opacity: 0.95; }

    .container {
      width: 92%;
      max-width: 1200px;
      margin: 30px auto;
    }

    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      padding: 20px;
      margin-bottom: 25px;
    }

    .intro { line-height: 1.6; font-size: 16px; }

    .btn {
      background: #0f766e;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn:hover { background: #115e59; }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      border: 1px solid #d1d5db;
      padding: 12px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #000;
      color: #fff;
      white-space: nowrap;
    }

    tr:nth-child(even) { background: #f9fafb; }

    .col-numero { width: 55px; text-align: center; font-weight: bold; }
    .col-info { width: 75px; text-align: center; }
    .col-objeto { min-width: 420px; }
    .col-links { width: 110px; text-align: center; }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      color: white;
      text-align: center;
    }

    .importante { background: #d97706; }
    .muy-probable { background: #2563eb; }
    .neutro { background: #6b7280; }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #e5e7eb;
      cursor: pointer;
    }

    .icon-btn:hover { background: #cbd5e1; }

    .objeto-wrap {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .objeto-texto { flex: 1; }

    .popup {
      display: none;
      position: fixed;
      z-index: 99999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      padding: 20px;
    }

    .popup-content {
      background: white;
      width: 92%;
      max-width: 700px;
      margin: 5% auto;
      padding: 22px;
      border-radius: 14px;
      position: relative;
      max-height: 80vh;
      overflow-y: auto;
    }

    .close {
      position: absolute;
      right: 14px;
      top: 8px;
      font-size: 26px;
      cursor: pointer;
    }

    .popup-content p {
      white-space: pre-wrap;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<header>
  <h1>Riesgos Legislativos en Temas de Concesiones Mineras</h1>
</header>

<div class="container">

  <div class="card">
    <h2>Tabla de iniciativas</h2>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>N°</th>
            <th>Info</th>
            <th>Objeto</th>
            <th>Impacto</th>
            <th>Probabilidad</th>
            <th>Riesgo</th>
          </tr>
        </thead>

        <tbody>

          <!-- FILA 1 -->
          <tr>
            <td>1</td>
            <td>
              <button class="icon-btn"
                onclick="abrirPopupTexto('Información de la fila 1','3377 - 20-10-2022.\nCongresistas Salhuana Cavides...')">
                ℹ
              </button>
            </td>

            <td>
              Ley sobre concesiones mineras Madre de Dios
            </td>

            <td><span class="badge importante">IMPORTANTE</span></td>
            <td><span class="badge muy-probable">MUY PROBABLE</span></td>
            <td><span class="badge neutro">NEUTRO</span></td>
          </tr>

          <!-- FILA 2 (CORREGIDA) -->
          <tr>
            <td>2</td>

            <td>
              <button class="icon-btn"
                onclick="abrirPopupTexto('Notas','8853 (09-09-2024) Congresista Muñante Barrios.\n\n9386 (31-10-2024) Congresista Dávila Atanacio.\n\n10610 (24-03-2025) Congresista Martínez Talavera.\n\n11045 (07-05-2025) Congresista Gutiérrez Ticona.\n\n12273 (02-09-2025) Congresista Sánchez Palomino.\n\n12708 y 12730 (09-10-2025) Congresista Bellido Ugarte.\n\n13481 (04-12-2025) Congresista Quispe Mamani.\n\n13497 (05-12-2025) Congresista Cruz Mamani.')">
                ℹ
              </button>
            </td>

            <td>
              Ley que modifica la Ley General de Minería
            </td>

            <td><span class="badge importante">IMPORTANTE</span></td>
            <td><span class="badge muy-probable">MUY PROBABLE</span></td>
            <td><span class="badge neutro">NEUTRO</span></td>
          </tr>

        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- POPUP -->
<div id="popupTexto" class="popup">
  <div class="popup-content">
    <span class="close" onclick="cerrarPopupTexto()">&times;</span>
    <h3 id="popupTextoTitulo"></h3>
    <p id="popupTextoContenido"></p>
  </div>
</div>

<script>
function abrirPopupTexto(titulo, contenido) {
  document.getElementById("popupTextoTitulo").innerText = titulo;
  document.getElementById("popupTextoContenido").innerText = contenido;
  document.getElementById("popupTexto").style.display = "block";
}

function cerrarPopupTexto() {
  document.getElementById("popupTexto").style.display = "none";
}
</script>

</body>
</html>
