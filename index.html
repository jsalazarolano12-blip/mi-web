<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riesgos Legislativos - Concesiones Mineras</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #1f2937;
    }

    /* 🔥 HEADER MEJORADO */
    header {
      background: white;
      padding: 35px 20px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
    }

    .header-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo-centro {
      height: 120px; /* 🔥 MÁS GRANDE */
      width: auto;
      object-fit: contain;
    }

    .titulo-principal {
      font-size: 28px; /* 🔥 TÍTULO GRANDE */
      font-weight: bold;
      margin: 0;
      color: #111827;
      letter-spacing: 0.5px;
    }

    /* CONTENEDOR */
    .container {
      width: 92%;
      max-width: 1200px;
      margin: 30px auto;
    }

    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      padding: 20px;
      margin-bottom: 25px;
    }

    h2 {
      text-align: center;
      font-size: 20px;
      margin-top: 0;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #d1d5db;
      padding: 12px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #cbbfa8;
    }

    tr:nth-child(even) {
      background: #f9fafb;
    }

    .col-numero {
      width: 60px;
      text-align: center;
      font-weight: bold;
    }

    .col-info {
      width: 90px;
      text-align: center;
    }

    .col-estado {
      width: 150px;
      text-align: center;
    }

    .col-riesgo {
      width: 150px;
      text-align: center;
    }

    .badge {
      padding: 7px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .riesgo-favorable {
      background: #16a34a;
      color: white;
    }

    .riesgo-neutro {
      background: #facc15;
      color: #111827;
    }

    .riesgo-desfavorable {
      background: #dc2626;
      color: white;
    }

    .estado-btn {
      padding: 8px 16px;
      border-radius: 10px;
      background: #e5e7eb;
      border: none;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
    }

    .estado-btn:hover {
      background: #d1d5db;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- 🔥 HEADER NUEVO -->
  <header>
    <div class="header-content">
      <img src="logo.JPG" alt="Logo" class="logo-centro">
      <h1 class="titulo-principal">RIESGOS LEGISLATIVOS</h1>
    </div>
  </header>

  <div class="container">

    <div class="card">
      <h2>Concesiones Mineras</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-numero">N°</th>
              <th class="col-info">Info</th>
              <th>Objeto del proyecto</th>
              <th class="col-estado">Estado actual</th>
              <th>Tema</th>
              <th class="col-riesgo">Riesgo</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td class="col-numero">1</td>
              <td class="col-info">8853</td>
              <td>
                Ley que modifica la Ley General de Minería para fortalecer el régimen de concesiones mineras.
              </td>
              <td class="col-estado">
                <button class="estado-btn">Ver</button>
              </td>
              <td>Concesiones mineras</td>
              <td class="col-riesgo">
                <span class="badge riesgo-desfavorable">Desfavorable</span>
              </td>
            </tr>
          </tbody>

        </table>
      </div>

    </div>

  </div>

  <footer>
    Página web basada en riesgos legislativos.
  </footer>

</body>
</html>
